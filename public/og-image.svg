<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5EBDB"/>
      <stop offset="100%" stop-color="#FAF6EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#C9A961" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#8B2635" stroke-width="2" opacity="0.25" rx="4"/>

  <!-- kicker -->
  <text x="600" y="170" font-family="Inter, sans-serif" font-size="22" font-weight="500" letter-spacing="6" fill="#5A3A20" text-anchor="middle" opacity="0.7">
    CAFFÈ · DOLCI · GERA
  </text>

  <!-- main display logo -->
  <text x="600" y="300" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" font-size="120" font-weight="400" fill="#8B2635" text-anchor="middle">
    la dolce
  </text>
  <text x="600" y="420" font-family="'Cormorant Garamond', Georgia, serif" font-size="140" font-weight="600" fill="#5A3A20" text-anchor="middle">
    Gera
  </text>

  <!-- tagline -->
  <text x="600" y="490" font-family="Inter, sans-serif" font-size="26" font-weight="400" fill="#5A3A20" text-anchor="middle" opacity="0.85">
    Ukrainische Konditorei · Maßgefertigte Torten
  </text>

  <!-- bottom badge -->
  <line x1="450" y1="540" x2="750" y2="540" stroke="#C9A961" stroke-width="1" opacity="0.6"/>
  <text x="600" y="575" font-family="Inter, sans-serif" font-size="18" letter-spacing="3" fill="#5A3A20" text-anchor="middle" opacity="0.75">
    HEINRICHSTRASSE 47 · 07545 GERA
  </text>
</svg>
